[build]
  command   = "hugo --minify"
  publish   = "public"

[build.environment]
  HUGO_VERSION = "0.128.0"

# Netlify Identity（Decap CMS 所需）
[[plugins]]
  package = "@netlify/plugin-lighthouse"

[context.production]
  command = "hugo --minify"

[context.deploy-preview]
  command = "hugo --minify --baseURL $DEPLOY_PRIME_URL"
